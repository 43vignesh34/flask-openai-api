server.port=5001
spring.application.name=springboot-openai-api
# Enable logging for web requests
logging.level.org.springframework.web=INFO

# H2 Database configuration (file-backed for persistence)
spring.datasource.url=jdbc:h2:file:./data/ipl_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
